# Publishes the site to GitHub Pages automatically.
#
# How it works: every push to main (or pressing "Run workflow" in the
# Actions tab) uploads the repository as-is — there's no build step —
# and deploys it to GitHub Pages. The configure-pages step even switches
# Pages on for the repository the first time, so there's nothing to click
# in Settings.
#
# The live site appears at:
#   https://hortonandy96-glitch.github.io/Wedding-Site/
# and later at hortonhearsido.com once the custom domain is connected.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Enable & configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Run the RSVP validation tests
        run: node --test tests/*.test.js

      - name: Upload the site files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
