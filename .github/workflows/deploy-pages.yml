# Publishes the site to GitHub Pages automatically.
#
# How it works: GitHub Pages serves this site from the `gh-pages` branch.
# Since there's no build step, "deploying" just means mirroring main onto
# gh-pages — this workflow does that on every push to main (after running
# the tests), so the live site updates itself within a couple of minutes.
# There is never a deploy button to press.
#
# The live site:
#   https://hortonandy96-glitch.github.io/Wedding-Site/
# and later hortonhearsido.com once the custom domain is connected.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Run the RSVP validation tests
        run: node --test tests/*.test.js

      - name: Publish (mirror main to the gh-pages branch)
        run: git push --force origin HEAD:gh-pages
